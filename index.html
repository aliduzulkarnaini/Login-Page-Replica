<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section>
        <div class="container">
            <div class="card">
                <div class="card-background">
                    <span class="card-background-1"></span>
                    <span class="card-background-2"></span>
                    <span class="card-background-3"></span>
                    <span class="card-background-4"></span>
                </div>

                <form class="login-form">
                    <label class="field">
                        <span class="field-icon field-icon-user"></span>
                        <input type="text" placeholder="User name / Email">
                    </label>
                    <label class="field">
                        <span class="field-icon field-icon-lock"></span>
                        <input type="password" placeholder="Password">
                    </label>
                    <button class="login-button" type="button">
                        <span>LOGIN NOW</span>
                        <span class="button-arrow">&rsaquo;</span>
                    </button>
                </form>

                <div class="social-login">
                    <p>log in via</p>
                    <div class="social-icons">
                        <a class="social-icon" href="#" aria-label="Instagram" title="Instagram">
                            <img src="image/instagram-icon.svg" alt="">
                        </a>
                        <a class="social-icon" href="#" aria-label="Facebook" title="Facebook">
                            <img src="image/facebook.svg" alt="">
                        </a>
                        <a class="social-icon" href="#" aria-label="Twitter" title="Twitter">
                            <img src="image/twitter.svg" alt="">
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
