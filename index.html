<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section>
        <div class="container">
            <div class="card">
                <div class="card-background">
                    <span class="card-background-1"></span>
                    <span class="card-background-2"></span>
                    <span class="card-background-3"></span>
                    <span class="card-background-4"></span>
                </div>

                <form class="login-form">
                    <label class="field">
                        <span class="field-icon field-icon-user"></span>
                        <input type="text" placeholder="User name / Email">
                    </label>
                    <label class="field">
                        <span class="field-icon field-icon-lock"></span>
                        <input type="password" placeholder="Password">
                    </label>
                    <button class="login-button" type="button">
                        <span>LOGIN NOW</span>
                        <span class="button-arrow">&rsaquo;</span>
                    </button>
                </form>

                <div class="social-login">
                    <p>log in via</p>
                    <div class="social-icons">
                        <span class="social-icon" aria-label="Instagram" title="Instagram">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <rect x="3" y="3" width="18" height="18" rx="5"></rect>
                                <circle cx="12" cy="12" r="4"></circle>
                                <circle cx="17.5" cy="6.5" r="1.2"></circle>
                            </svg>
                        </span>
                        <span class="social-icon" aria-label="Facebook" title="Facebook">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M14 8h3V4h-3c-3.1 0-5 1.9-5 5v2H6v4h3v5h4v-5h3.2l.8-4h-4V9c0-.7.3-1 1-1z"></path>
                            </svg>
                        </span>
                        <span class="social-icon" aria-label="Twitter" title="Twitter">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M21 6.1c-.7.3-1.4.5-2.2.6.8-.5 1.3-1.1 1.6-2-.7.4-1.6.8-2.4.9A3.8 3.8 0 0 0 11.4 9c0 .3 0 .6.1.9A10.8 10.8 0 0 1 3.6 5.8a3.8 3.8 0 0 0 1.2 5.1c-.6 0-1.2-.2-1.7-.5v.1c0 1.8 1.3 3.3 3 3.7-.3.1-.7.1-1 .1-.2 0-.5 0-.7-.1.5 1.5 1.9 2.6 3.6 2.6A7.7 7.7 0 0 1 3.2 18.4H2.3A10.8 10.8 0 0 0 8.2 20c7 0 10.9-5.8 10.9-10.9v-.5c.8-.7 1.4-1.4 1.9-2.5z"></path>
                            </svg>
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
